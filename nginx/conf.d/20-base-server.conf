server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index static/index.html;
    client_max_body_size 5m;

    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/http-redirect.conf;

    location = / {
        try_files /static/index.html =404;
    }

    location /static/ {
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /app/ {
        add_header X-Lab-Route path-app always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://app_pool/;
    }

    location /api/ {
        add_header X-Lab-Route path-api always;
        limit_req zone=api_rate burst=10 nodelay;
        limit_conn client_conn 10;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend/;
    }

    location /secure/ {
        auth_basic "Nginx Lab";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header X-Lab-Route secure-api always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend/;
    }

    location /cache/ {
        add_header X-Lab-Route cached-api always;
        include /etc/nginx/snippets/proxy-common.conf;
        include /etc/nginx/snippets/cache.conf;
        proxy_pass http://api_backend/cache/;
    }

    location /limited/ {
        add_header X-Lab-Route limited-api always;
        limit_req zone=api_rate burst=5 nodelay;
        limit_conn client_conn 3;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend/;
    }

    location /ws/ {
        add_header X-Lab-Route websocket always;
        include /etc/nginx/snippets/websocket.conf;
        set $ws_upstream ws:8765;
        proxy_pass http://$ws_upstream;
    }

    location = /nginx_status {
        access_log off;
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    error_page 500 502 503 504 /errors/50x.html;
    location /errors/ {
        internal;
    }
}
