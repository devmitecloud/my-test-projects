name: nginx-lab

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app-a:
        condition: service_started
      app-b:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - lab
    restart: unless-stopped

  app-a:
    build:
      context: ./services/backend
    environment:
      APP_NAME: app-a
      APP_PORT: "8080"
      APP_ROLE: frontend
    networks:
      - lab
    restart: unless-stopped

  app-b:
    build:
      context: ./services/backend
    environment:
      APP_NAME: app-b
      APP_PORT: "8080"
      APP_ROLE: frontend
    networks:
      - lab
    restart: unless-stopped

  api:
    build:
      context: ./services/backend
    environment:
      APP_NAME: api
      APP_PORT: "8080"
      APP_ROLE: api
    networks:
      - lab
    restart: unless-stopped

  ws:
    build:
      context: ./services/ws
    environment:
      WS_NAME: ws
      WS_PORT: "8765"
    networks:
      - lab
    profiles:
      - ws
    restart: unless-stopped

networks:
  lab:
    driver: bridge

volumes:
  nginx_cache:
