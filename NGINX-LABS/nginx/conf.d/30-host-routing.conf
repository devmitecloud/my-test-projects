server {
    listen 80;
    server_name app.lab.local;

    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/http-redirect.conf;

    location / {
        add_header X-Lab-Route host-app always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://app_pool;
    }
}

server {
    listen 80;
    server_name api.lab.local;

    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/http-redirect.conf;

    location / {
        add_header X-Lab-Route host-api always;
        limit_req zone=api_rate burst=10 nodelay;
        limit_conn client_conn 10;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend;
    }

    location /secure/ {
        auth_basic "Nginx Lab";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header X-Lab-Route host-secure-api always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend;
    }

    location /cache/ {
        add_header X-Lab-Route host-cache always;
        include /etc/nginx/snippets/proxy-common.conf;
        include /etc/nginx/snippets/cache.conf;
        proxy_pass http://api_backend/cache/;
    }
}
