upstream app_pool {
    zone app_pool 64k;
    least_conn;
    server app-a:8080 resolve max_fails=3 fail_timeout=10s;
    server app-b:8080 resolve max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream api_backend {
    zone api_backend 64k;
    server api:8080 resolve max_fails=3 fail_timeout=10s;
}
