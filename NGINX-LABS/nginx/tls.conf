server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/nginx/certs/lab.crt;
    ssl_certificate_key /etc/nginx/certs/lab.key;

    root /usr/share/nginx/html;
    index static/index.html;
    client_max_body_size 5m;

    include /etc/nginx/snippets/security-headers.conf;

    location = / {
        try_files /static/index.html =404;
    }

    location /static/ {
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /app/ {
        add_header X-Lab-Route path-app-tls always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://app_pool/;
    }

    location /api/ {
        add_header X-Lab-Route path-api-tls always;
        limit_req zone=api_rate burst=10 nodelay;
        limit_conn client_conn 10;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend/;
    }

    location /secure/ {
        auth_basic "Nginx Lab";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header X-Lab-Route secure-api-tls always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend/;
    }

    location /cache/ {
        add_header X-Lab-Route cached-api-tls always;
        include /etc/nginx/snippets/proxy-common.conf;
        include /etc/nginx/snippets/cache.conf;
        proxy_pass http://api_backend/cache/;
    }

    location /limited/ {
        add_header X-Lab-Route limited-api-tls always;
        limit_req zone=api_rate burst=5 nodelay;
        limit_conn client_conn 3;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend/;
    }

    location /ws/ {
        add_header X-Lab-Route websocket-tls always;
        include /etc/nginx/snippets/websocket.conf;
        set $ws_upstream ws:8765;
        proxy_pass http://$ws_upstream;
    }

    error_page 500 502 503 504 /errors/50x.html;
    location /errors/ {
        internal;
    }
}

server {
    listen 443 ssl http2;
    server_name app.lab.local;

    ssl_certificate /etc/nginx/certs/lab.crt;
    ssl_certificate_key /etc/nginx/certs/lab.key;

    include /etc/nginx/snippets/security-headers.conf;

    location / {
        add_header X-Lab-Route host-app-tls always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://app_pool;
    }
}

server {
    listen 443 ssl http2;
    server_name api.lab.local;

    ssl_certificate /etc/nginx/certs/lab.crt;
    ssl_certificate_key /etc/nginx/certs/lab.key;

    include /etc/nginx/snippets/security-headers.conf;

    location / {
        add_header X-Lab-Route host-api-tls always;
        limit_req zone=api_rate burst=10 nodelay;
        limit_conn client_conn 10;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend;
    }

    location /secure/ {
        auth_basic "Nginx Lab";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header X-Lab-Route host-secure-api-tls always;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://api_backend;
    }

    location /cache/ {
        add_header X-Lab-Route host-cache-tls always;
        include /etc/nginx/snippets/proxy-common.conf;
        include /etc/nginx/snippets/cache.conf;
        proxy_pass http://api_backend/cache/;
    }
}
